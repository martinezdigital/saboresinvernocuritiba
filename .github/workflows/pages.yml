name: Publicar site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar arquivos
        uses: actions/checkout@v4

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Montar pacote estático
        run: |
          mkdir _site
          cp -R index.html styles.css app.js votacao-oficial.js CNAME .nojekyll assets _site/

      - name: Enviar pacote
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
